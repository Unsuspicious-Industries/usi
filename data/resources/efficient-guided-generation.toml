subjects = ["cs/constrained-generation", "ml/llm"]
blurb = "Encountering thid work was a an important moment. One of the inspiratoin for P7 and USI as a whole. The paper introduces a novel approach to constrained decoding (more efficient that naive parsers and earleys) and applies it to a variety of tasks, using a grammar agnostic core engine and loading grammars at runtime. This idea of system agnosticism is the core principle in AUFBAU/P7. "
